# When a bug is closed as *completed* (i.e. actually fixed), make sure it is
# attached to the next milestone — the lowest open version number — so the
# release notes capture it. Pure rules, no inference, no external service.
#
# Skipped when the issue was closed as "not planned" (GitHub's not_planned
# state reason) or carries a "duplicate" / "won't fix" label, and when it
# already has a milestone.

name: Milestone on close

on:
  issues:
    types: [closed]

permissions:
  contents: read
  issues: write

jobs:
  attach-milestone:
    runs-on: ubuntu-latest
    # Only completed closes; "not planned" closes carry state_reason == not_planned.
    if: github.event.issue.state_reason == 'completed'
    steps:
      - name: Attach next milestone
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE: ${{ github.event.issue.number }}
          HAS_MILESTONE: ${{ github.event.issue.milestone != null }}
          LABELS: ${{ toJson(github.event.issue.labels.*.name) }}
        run: |
          set -euo pipefail

          # Don't touch issues closed as duplicates or explicitly won't-fix.
          if printf '%s' "$LABELS" | jq -e 'any(. == "duplicate" or . == "won'\''t fix")' >/dev/null; then
            echo "Issue is labelled duplicate/won't fix; leaving milestone alone."
            exit 0
          fi

          if [ "$HAS_MILESTONE" = "true" ]; then
            echo "Issue already has a milestone; nothing to do."
            exit 0
          fi

          # Next milestone = lowest open version number (e.g. 0.1 before 1.0).
          ms=$(gh api "repos/${REPO}/milestones?state=open&per_page=100" \
                 --jq '.[].title' | sort -V | head -n1)

          if [ -z "$ms" ]; then
            echo "::warning::no open milestone found; nothing to attach"
            exit 0
          fi

          gh issue edit "$ISSUE" --repo "$REPO" --milestone "$ms"
          echo "Attached milestone '$ms' to closed issue #${ISSUE}."

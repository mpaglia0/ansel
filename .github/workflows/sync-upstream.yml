name: Sync Fork with Upstream

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/aurelienpierreeng/ansel.git || true

      - name: Fetch all remotes
        run: |
          git fetch origin
          git fetch upstream

      - name: Sync master safely
        run: |
          git checkout master

          echo "== Stato iniziale =="
          git status

          # 1. Allinea con origin (fix non-fast-forward)
          git pull origin master --rebase || true

          # 2. Merge upstream

name: Sync Fork with Upstream

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-fork
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/aurelienpierreeng/ansel.git

      - name: Fetch all
        run: |
          git fetch origin
          git fetch upstream

      - name: Align with origin/master
        run: |
          git checkout master
          git merge origin/master --ff-only

      - name: Merge upstream/master into master
        run: |
          git merge upstream/master --no-edit

      - name: Push to fork (with retry)
        run: |
          for i in 1 2 3 4 5; do
            if git push origin master; then
              echo "Push riuscito al tentativo $i"
              exit 0
            fi
            echo "Push rifiutato, ritento ($i)..."
            git fetch origin
            git merge origin/master --ff-only
            sleep 5
          done
          echo "Push fallito dopo 5 tentativi"
          exit 1

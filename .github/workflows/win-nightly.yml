name: Nightly Win PKG

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

jobs:
  Win64:
    if: github.repository == 'aurelienpierreeng/ansel' || github.event_name == 'workflow_dispatch'
    name: Nightly Ansel Win64 build
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        btype:
          - RelWithDebInfo
        compiler:
          - { compiler: LLVM20, CC: clang, CXX: clang++, GCC_VER: "", LLVM_VER: "20" }
        eco: [-DBINARY_PACKAGE_BUILD=ON -DBUILD_CHANNEL=nightly -DUSE_XMLLINT=OFF]
        target:
          - skiptest
        generator:
          - Ninja
        branch:
          - { code: "${{ github.ref_name }}", label: stable }
        msystem:
          - UCRT64
    defaults:
      run:
        shell: msys2 {0}
    env:
      CC: ${{ matrix.compiler.CC }}
      CXX: ${{ matrix.compiler.CXX }}
      GCC_VER: ${{ matrix.compiler.GCC_VER }}
      LLVM_VER: ${{ matrix.compiler.LLVM_VER }}
      SRC_DIR: ${{ github.workspace }}/src
      BUILD_DIR: ${{ github.workspace }}/build
      INSTALL_PREFIX: ${{ github.workspace }}/install
      ECO: ${{ matrix.eco }}
      CMAKE_BUILD_TYPE: ${{ matrix.btype }}
      GENERATOR: ${{ matrix.generator }}
      TARGET: ${{ matrix.target }}
      BRANCH: ${{ matrix.branch.code }}
      BUILD_NAME: ${{ matrix.branch.label }}
    steps:
      - uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
      - name: Checkout ansel source
        uses: actions/checkout@v6
        with:
          ref: ${{ env.BRANCH }}
          fetch-depth: 5000
          fetch-tags: true
          submodules: true
          path: src
      - name: Install Base Dependencies
        run: |
          $(cygpath ${SRC_DIR})/packaging/install-deps-windows-msys2.sh
      - name: Update lensfun data
        run: |
          python --version
          lensfun-update-data
      - name: Build and Install
        run: |
          cmake -E make_directory "${BUILD_DIR}"
          cmake -E make_directory "${INSTALL_PREFIX}"
          $(cygpath ${SRC_DIR})/.ci/ci-script.sh
      - name: Upload debug symbols to Sentry
        if: ${{ success() }}
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          $(cygpath ${SRC_DIR})/tools/sentry-upload-symbols.sh "$(cygpath ${BUILD_DIR})"
      - name: Check if it runs
        run: |
          $(cygpath ${INSTALL_PREFIX})/bin/ansel.exe --version || true
          $(cygpath ${INSTALL_PREFIX})/bin/ansel-cli.exe \
                 --width 2048 --height 2048 \
                 --apply-custom-presets false \
                 $(cygpath '${{ github.workspace }}')/tests/integration/images/mire1.cr2 \
                 $(cygpath '${{ github.workspace }}')/tests/integration/0000-nop/nop.xmp \
                 output.png \
                 --core --disable-opencl --conf host_memory_limit=8192 \
                 --conf worker_threads=4 -t 4 \
                 --conf plugins/lighttable/export/force_lcms2=FALSE \
                 --conf plugins/lighttable/export/iccintent=0
      - name: Package
        if: ${{ success() }}
        run: |
          cd "${BUILD_DIR}"
          cmake --build "${BUILD_DIR}" --target package
      - name: Package upload
        if: ${{ success() }}
        uses: actions/upload-artifact@v6
        with:
          name: ansel.${{ env.BUILD_NAME }}.win64
          path: ${{ env.BUILD_DIR }}/ansel-*.exe
          retention-days: 90

  upload_to_release:
    runs-on: ubuntu-latest
    needs: Win64
    env:
      REPO: "https://github.com/aurelienpierreeng/ansel"
      ROOM: "!SgRYbzspwqwwUgSQHC:matrix.org"
      TAG: "v0.0.0"
    steps:
      - name: Checkout ansel source
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ansel.stable.win64
      - name: Update nightly release
        uses: aurelienpierreeng/tip@master
        with:
          tag: ${{ env.TAG }}
          rm: false
          token: ${{ secrets.GITHUB_TOKEN }}
          files: ansel-*.exe

      - name: Install dependencies
        run: |
          python -m pip install simplematrixbotlib

      - name: Notify Matrix
        if: ${{ success() }}
        run: |
          FILENAME=$(tr '~' '.' <<< "$(find . -type f -iname "ansel-*.exe")")
          MESSAGE="New Exe [${FILENAME}](${{ env.REPO }}/releases/download/${{ env.TAG }}/${FILENAME}) built"
          python .ci/matrix.py \
          -m "$MESSAGE" \
          -s ${{ secrets.MATRIX_SERVER }} \
          -u ${{ secrets.MATRIX_USER }} \
          -t ${{ secrets.MATRIX_ACCESS }} \
          -r ${{ env.ROOM }}
